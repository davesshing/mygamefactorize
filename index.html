<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>因式分解大挑戰 V6 (分級版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.js"></script>

    <style>
        body {
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Hide Scrollbar but allow scroll */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const Icon = ({ path, className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );
        const RefreshCw = (p) => <Icon {...p} path={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />;
        const Check = (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12"/>} />;
        const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Trophy = (p) => <Icon {...p} path={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>} />;
        const ArrowRight = (p) => <Icon {...p} path={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />;
        const Delete = (p) => <Icon {...p} path={<path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM18 9l-6 6M12 9l6 6"/>} />;
        const BookOpen = (p) => <Icon {...p} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const Layers = (p) => <Icon {...p} path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;
        const Lock = (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
        const AlertTriangle = (p) => <Icon {...p} path={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const LogOut = (p) => <Icon {...p} path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />;
        const Filter = (p) => <Icon {...p} path={<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>} />;
        const Zap = (p) => <Icon {...p} path={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />;
        const Feather = (p) => <Icon {...p} path={<path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5zM16 8L2 22M17.5 15H9"/>} />;

        // --- Latex Component ---
        const Latex = ({ content, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.katex && containerRef.current) {
                    try {
                        window.katex.render(content, containerRef.current, { throwOnError: false, displayMode: false });
                    } catch (e) { containerRef.current.innerText = content; }
                }
            }, [content]);
            return <span ref={containerRef} className={className}>{content}</span>;
        };

        // --- Logic Helpers ---
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const fmt = (coeff, variable, power = 1) => {
            if (coeff === 0) return "";
            let str = "";
            if (coeff < 0) str += "-"; 
            if (Math.abs(coeff) !== 1) str += Math.abs(coeff); 
            if (variable) {
                str += variable;
                if (power > 1) str += `^${power}`;
            } else if (Math.abs(coeff) === 1) {
                str += "1"; 
            }
            return str;
        };

        const gcd = (a, b) => {
            a = Math.abs(a);
            b = Math.abs(b);
            return b === 0 ? a : gcd(b, a % b);
        };

        const getTermsGCD = (expression) => {
            let s = expression.replace(/\s/g, '');
            s = s.replace(/-/g, '+-');
            if (s.startsWith('+-')) s = s.substring(1); 
            if (s.startsWith('+')) s = s.substring(1);
            const parts = s.split('+').filter(p => p !== '');
            if (parts.length < 2) return 1; 
            const coeffs = parts.map(p => {
                let numStr = p.replace(/[a-z].*/i, '');
                if (numStr === '' || numStr === '+') return 1;
                if (numStr === '-' || numStr === '+-') return 1;
                const val = parseInt(numStr, 10);
                return isNaN(val) ? 1 : Math.abs(val);
            });
            if (coeffs.length === 0) return 1;
            return coeffs.reduce((acc, val) => gcd(acc, val), coeffs[0]);
        };

        // --- Question Generators ---
        const generateShortQuestion = (difficulty = 'easy', lastType = null) => {
            let types = [];
            if (difficulty === 'easy') {
                types = ['common_easy', 'diffSq_easy', 'perfSq_easy', 'cross_easy'];
            } else {
                types = ['common_hard', 'diffSq_hard', 'perfSq_hard', 'cross_hard'];
            }

            let selectedType = types[Math.floor(Math.random() * types.length)];
            if (selectedType === lastType) {
                selectedType = types[Math.floor(Math.random() * types.length)];
            }

            let latex = "", typeName = "";

            if (selectedType === 'common_easy') {
                typeName = "提取公因式 (基礎)";
                const k = r(2, 5);
                const a = r(1, 4);
                latex = `${fmt(k, 'x')} ${Math.random()>0.5?'+':'-'} ${k*a}`;
            } else if (selectedType === 'common_hard') {
                typeName = "提取公因式 (進階)";
                const k = r(3, 8); 
                const a = r(2, 6);
                if (Math.random() > 0.5) {
                    latex = `${fmt(k, 'x', 2)} ${Math.random()>0.5?'+':'-'} ${fmt(k*a, 'x')}`;
                } else {
                    latex = `${fmt(k, 'x')}y ${Math.random()>0.5?'+':'-'} ${fmt(k*a, 'y')}`; 
                }
            } else if (selectedType === 'diffSq_easy') {
                typeName = "平方差 (基礎)";
                const b = r(1, 5);
                latex = `x^2 - ${b*b}`;
            } else if (selectedType === 'diffSq_hard') {
                typeName = "平方差 (進階)";
                const a = r(2, 9);
                let b = r(1, 9);
                if (gcd(a, b) > 1) { b = b === 1 ? 2 : 1; a = r(2,5); } 
                latex = `${fmt(a*a, 'x', 2)} - ${fmt(b*b, 'y', 2)}`;
            } else if (selectedType === 'perfSq_easy') {
                typeName = "完全平方 (基礎)";
                const a = r(1, 5);
                const sign = Math.random()>0.5?'+':'-';
                latex = `x^2 ${sign} ${2*a}x + ${a*a}`;
            } else if (selectedType === 'perfSq_hard') {
                typeName = "完全平方 (進階)";
                const a = r(2, 5); 
                const b = r(1, 9);
                const sign = Math.random()>0.5?'+':'-';
                latex = `${fmt(a*a, 'x', 2)} ${sign} ${fmt(2*a*b, 'x')} + ${b*b}`;
            } else if (selectedType === 'cross_easy') {
                typeName = "十字相乘 (基礎)";
                const n1 = r(-6, 6) || 1;
                const n2 = r(-6, 6) || 1;
                const B = n1 + n2;
                const C = n1 * n2;
                let mid = B === 0 ? "" : (B > 0 ? `+ ${fmt(B, 'x')}` : `- ${fmt(Math.abs(B), 'x')}`);
                let last = C > 0 ? `+ ${C}` : `- ${Math.abs(C)}`;
                latex = `x^2 ${mid} ${last}`;
                latex = latex.replace(/\s+/g, ' ').replace(/\+\s*\-/g, '- ');
            } else if (selectedType === 'cross_hard') {
                typeName = "十字相乘 (進階)";
                const aVals = [2, 3, 5];
                const a = aVals[Math.floor(Math.random() * aVals.length)];
                let p, q, c;
                let attempts = 0;
                do {
                    p = r(-7, 7);
                    q = r(-5, 5);
                    if (p === 0) p = 1;
                    if (q === 0) q = 1;
                    c = p * q;
                    attempts++;
                } while ((Math.abs(c) > 20 || p % a === 0) && attempts < 10);
                
                if (p % a === 0) p += 1; 

                const b = a * q + p;
                let mid = b === 0 ? "" : (b > 0 ? `+ ${fmt(b, 'x')}` : `- ${fmt(Math.abs(b), 'x')}`);
                let last = c > 0 ? `+ ${c}` : `- ${Math.abs(c)}`;
                latex = `${a}x^2 ${mid} ${last}`;
                latex = latex.replace(/\s+/g, ' ').replace(/\+\s*\-/g, '- ');
            }

            return {
                isLong: false,
                parts: [{ id: 'a', latex, type: typeName }],
                rawType: selectedType
            };
        };

        const generateLongQuestion = () => {
            const scenario = Math.random() > 0.4 ? 'grouping' : 'diffSq_complex';
            if (scenario === 'grouping') {
                const n1 = r(-5, 5) || 1;
                const n2 = r(-5, 5) || 2; 
                const A_latex = `x^2 ${n1+n2 >= 0 ? '+' : '-'} ${Math.abs(n1+n2)}x ${n1*n2 >= 0 ? '+' : '-'} ${Math.abs(n1*n2)}`;
                const k = r(2, 5);
                const B_display = `${fmt(k,'x')} ${k*n1>=0?'+':'-'} ${Math.abs(k*n1)} - x^2 ${-(n1+n2)>=0?'+':'-'} ${Math.abs(n1+n2)}x ${-(n1*n2)>=0?'+':'-'} ${Math.abs(n1*n2)}`;
                return {
                    isLong: true,
                    parts: [
                        { id: 'a', latex: A_latex, type: '因式分解 (十字相乘)' },
                        { id: 'b', latex: B_display, type: '利用 (a) 部結果' }
                    ]
                };
            } else {
                const a = r(1, 2);
                const b = r(1, 4);
                const A_latex = `${fmt(a*a, 'x', 2)} + ${fmt(2*a*b, 'x')} + ${b*b}`;
                const B_latex = `${A_latex} - y^2`;
                return {
                    isLong: true,
                    parts: [
                        { id: 'a', latex: A_latex, type: '因式分解 (完全平方)' },
                        { id: 'b', latex: B_latex, type: '利用 (a) 部結果' }
                    ]
                };
            }
        };

        const checkAnswer = (questionLatex, userAnswer) => {
            const cleanUser = userAnswer.replace(/\s/g, '');
            if (cleanUser.length === 0) return { correct: false, msg: "請輸入答案" };
            if (!cleanUser.includes('(')) return { correct: false, msg: "需包含括號 ()" };

            const parseToJs = (str) => {
                let s = str.replace(/\\/g, '').replace(/\^2/g, '**2');
                s = s.replace(/([0-9xya-z])\(/g, '$1*(').replace(/\)([0-9xya-z])/g, ')*$1').replace(/\)\(/g, ')*(');
                s = s.replace(/(\d)([xy])/g, '$1*$2').replace(/([xy])([xy])/g, '$1*$2');
                return s;
            };

            try {
                const qFuncStr = parseToJs(questionLatex);
                const uFuncStr = parseToJs(cleanUser);
                const testPoints = [{x:2,y:3}, {x:0,y:5}, {x:-3,y:1}, {x:1.5,y:-2.5}];

                for (let p of testPoints) {
                    const qVal = new Function('x', 'y', `return ${qFuncStr}`)(p.x, p.y);
                    const uVal = new Function('x', 'y', `return ${uFuncStr}`)(p.x, p.y);
                    if (Math.abs(qVal - uVal) > 0.0001) return { correct: false, msg: "答案不正確" };
                }
                
                const parenGroups = cleanUser.match(/\(([^)]+)\)/g);
                if (parenGroups) {
                    for (let group of parenGroups) {
                        const content = group.slice(1, -1);
                        if (getTermsGCD(content) > 1) {
                            return { correct: false, msg: "未化至最簡：括號內仍有公因式" };
                        }
                    }
                }
                return { correct: true, msg: "正確！" };

            } catch (e) {
                return { correct: false, msg: "格式錯誤" };
            }
        };

        // --- Main Component ---
        const FactorizationGameV6 = () => {
            const [appState, setAppState] = useState('menu'); 
            const [gameMode, setGameMode] = useState('short_easy'); 
            const [questions, setQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [currentPartIndex, setCurrentPartIndex] = useState(0); 
            const [lastQuestionType, setLastQuestionType] = useState(null); 
            const [partAnswers, setPartAnswers] = useState({}); 
            const [score, setScore] = useState(0);
            const [userInput, setUserInput] = useState("");
            const [feedback, setFeedback] = useState(null);
            const [history, setHistory] = useState([]);
            const [showWrongOnly, setShowWrongOnly] = useState(false);

            const startGame = (mode) => {
                setGameMode(mode);
                setScore(0);
                setHistory([]);
                setUserInput("");
                setFeedback(null);
                setCurrentQIndex(0);
                setCurrentPartIndex(0);
                setPartAnswers({});
                
                let firstQ;
                if (mode === 'long') {
                    firstQ = generateLongQuestion();
                } else {
                    const difficulty = mode === 'short_easy' ? 'easy' : 'hard';
                    firstQ = generateShortQuestion(difficulty);
                    setLastQuestionType(firstQ.rawType);
                }

                setQuestions([firstQ]);
                setAppState('playing');
            };

            const appendNextQuestion = () => {
                let nextQ;
                if (gameMode === 'long') {
                    nextQ = generateLongQuestion();
                } else {
                    const difficulty = gameMode === 'short_easy' ? 'easy' : 'hard';
                    nextQ = generateShortQuestion(difficulty, lastQuestionType);
                    setLastQuestionType(nextQ.rawType);
                }
                setQuestions(prev => [...prev, nextQ]);
            };

            const handleKey = (val) => {
                if (feedback?.type === 'success' && !isQuestionComplete()) return; 
                if (val === 'DEL') setUserInput(prev => prev.slice(0, -1));
                else if (val === 'AC') setUserInput("");
                else setUserInput(prev => prev + val);
            };

            const isQuestionComplete = () => {
                const currentQ = questions[currentQIndex];
                return currentPartIndex >= currentQ.parts.length;
            };

            const submitAnswer = () => {
                if (feedback?.type === 'success' && feedback.isFinal) return;
                const currentQ = questions[currentQIndex];
                const currentPart = currentQ.parts[currentPartIndex];
                const result = checkAnswer(currentPart.latex, userInput);
                
                if (result.correct) {
                    const newPartAnswers = { ...partAnswers, [currentPartIndex]: userInput };
                    setPartAnswers(newPartAnswers);
                    setScore(prev => prev + 1);

                    if (currentPartIndex < currentQ.parts.length - 1) {
                        setFeedback({ type: 'success', msg: `(a) 部正確！請繼續完成 (b) 部`, isFinal: false });
                        setTimeout(() => {
                            recordHistory(currentQIndex + 1, currentPart.id, currentPart.latex, userInput, true);
                            setCurrentPartIndex(prev => prev + 1);
                            setUserInput("");
                            setFeedback(null);
                        }, 1200);
                    } else {
                        setFeedback({ type: 'success', msg: "全題正確！", isFinal: true });
                        recordHistory(currentQIndex + 1, currentPart.id, currentPart.latex, userInput, true);
                    }
                } else {
                    setFeedback({ type: 'error', msg: result.msg });
                }
            };

            const nextQuestion = () => {
                appendNextQuestion();
                setCurrentQIndex(prev => prev + 1);
                setCurrentPartIndex(0);
                setPartAnswers({});
                setUserInput("");
                setFeedback(null);
            };

            const skipQuestion = () => {
                const currentQ = questions[currentQIndex];
                const currentPart = currentQ.parts[currentPartIndex];
                recordHistory(currentQIndex + 1, currentPart.id, currentPart.latex, userInput || "(未作答)", false);
                nextQuestion();
            };

            const recordHistory = (qId, partId, latex, userAns, correct) => {
                setHistory(prev => [...prev, { qId, part: partId, latex, userAns, correct }]);
            };

            const endGame = () => setAppState('summary');
            const currentQ = questions[currentQIndex];

            // --- UI ---
            const KeyBtn = ({ val, label, onClick, main = false, color }) => {
                const display = label || (val === '^2' ? <Latex content="^2" /> : val);
                let bgClass = "bg-white hover:bg-slate-50 text-indigo-600 border-b-2 border-slate-200 active:border-b-0 active:translate-y-[2px]";
                if (main) bgClass = "bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold border-b-2 border-indigo-200 active:border-b-0 active:translate-y-[2px]";
                if (color === 'red') bgClass = "bg-red-50 hover:bg-red-100 text-red-600 border-b-2 border-red-200 active:border-b-0 active:translate-y-[2px]";
                
                return (
                    <button onClick={() => onClick(val)} className={`${bgClass} rounded-lg py-3 text-lg transition-all flex items-center justify-center select-none shadow-sm h-12 w-full touch-manipulation`}>
                        {display}
                    </button>
                );
            };

            const Keyboard = () => (
                <div className="grid grid-cols-4 gap-2 mt-auto pb-4 shrink-0 w-full select-none">
                    {['x', 'y', '(', ')'].map(k => <KeyBtn key={k} val={k} onClick={handleKey} main />)}
                    {['7', '8', '9', '^2'].map(k => <KeyBtn key={k} val={k} onClick={handleKey} />)}
                    {['4', '5', '6', '+'].map(k => <KeyBtn key={k} val={k} onClick={handleKey} />)}
                    {['1', '2', '3', '-'].map(k => <KeyBtn key={k} val={k} onClick={handleKey} />)}
                    <KeyBtn val="0" onClick={handleKey} />
                    <KeyBtn val="AC" label="AC" onClick={handleKey} color="red" />
                    <button onClick={() => handleKey('DEL')} className="col-span-2 bg-gray-300 text-gray-700 rounded-lg flex items-center justify-center shadow-sm active:bg-gray-400">
                        <Delete size={24} />
                    </button>
                </div>
            );

            return (
                <div className="h-[100dvh] bg-slate-50 text-slate-800 font-sans flex flex-col items-center max-w-md mx-auto shadow-2xl border-x border-slate-200 overflow-hidden">
                
                {/* Header */}
                <div className="w-full flex justify-between items-center py-3 border-b border-slate-200 bg-white px-4 shrink-0 z-10">
                    <h1 className="text-lg font-bold text-indigo-700 flex items-center gap-2">
                        <BookOpen className="w-5 h-5" /> 因式分解 V6
                    </h1>
                    {appState === 'playing' && (
                        <div className="flex gap-2 items-center">
                            <span className="text-sm font-bold text-slate-400">Q{currentQIndex + 1}</span>
                            <div className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded-md flex items-center gap-1 text-xs font-bold">
                                <Trophy size={12}/> {score}
                            </div>
                            <button onClick={endGame} className="ml-2 bg-red-100 text-red-600 p-1 rounded hover:bg-red-200" title="結束練習">
                                <LogOut size={16} />
                            </button>
                        </div>
                    )}
                </div>

                {/* Menu */}
                {appState === 'menu' && (
                    <div className="flex-1 flex flex-col justify-center w-full gap-4 px-4 overflow-y-auto py-6">
                        <div className="text-center mb-4">
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">請選擇挑戰模式</h2>
                            <div className="bg-yellow-50 text-yellow-800 text-xs p-2 rounded-lg inline-block border border-yellow-200">
                                <span className="flex items-center gap-1 justify-center"><AlertTriangle size={12}/> 注意：答案必須化至最簡</span>
                            </div>
                        </div>
                        
                        <button onClick={() => startGame('short_easy')} className="group bg-white p-5 rounded-2xl shadow-sm border-2 border-slate-100 hover:border-green-500 transition-all text-left">
                            <div className="flex items-center gap-4">
                                <div className="bg-green-100 p-3 rounded-full text-green-600"><Feather size={24}/></div>
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 group-hover:text-green-600">短答題 (初階版)</h3>
                                    <p className="text-xs text-slate-400">基礎鞏固：係數較小，題型簡單</p>
                                </div>
                            </div>
                        </button>

                        <button onClick={() => startGame('short_hard')} className="group bg-white p-5 rounded-2xl shadow-sm border-2 border-slate-100 hover:border-orange-500 transition-all text-left">
                            <div className="flex items-center gap-4">
                                <div className="bg-orange-100 p-3 rounded-full text-orange-600"><Zap size={24}/></div>
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 group-hover:text-orange-600">短答題 (進階版)</h3>
                                    <p className="text-xs text-slate-400">強化訓練：係數較大，進階十字相乘</p>
                                </div>
                            </div>
                        </button>

                        <button onClick={() => startGame('long')} className="group bg-white p-5 rounded-2xl shadow-sm border-2 border-slate-100 hover:border-purple-500 transition-all text-left">
                            <div className="flex items-center gap-4">
                                <div className="bg-purple-100 p-3 rounded-full text-purple-600"><Layers size={24}/></div>
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 group-hover:text-purple-600">長問題 (綜合版)</h3>
                                    <p className="text-xs text-slate-400">DSE 題型：(a) 及 (b) 部連續題</p>
                                </div>
                            </div>
                        </button>
                    </div>
                )}

                {/* Playing Area */}
                {appState === 'playing' && currentQ && (
                    <div className="w-full flex-1 flex flex-col overflow-hidden">
                        <div className="flex-1 overflow-y-auto p-4 pb-20">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                {currentQ.parts.map((part, index) => {
                                    const isCompleted = index < currentPartIndex;
                                    const isActive = index === currentPartIndex;
                                    const isLocked = index > currentPartIndex;
                                    return (
                                        <div key={index} className={`p-5 border-b border-slate-100 last:border-0 transition-opacity duration-300 ${isLocked ? 'opacity-50 grayscale' : 'opacity-100'}`}>
                                            <div className="flex justify-between items-start mb-3">
                                                <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded ${isActive ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'}`}>
                                                    {currentQ.isLong ? `Part (${part.id})` : `Question ${currentQIndex + 1}`}
                                                </span>
                                                <span className="text-xs text-slate-400">{part.type}</span>
                                            </div>
                                            <div className="text-xl font-medium mb-4 overflow-x-auto"><Latex content={part.latex} /></div>
                                            {isCompleted ? (
                                                <div className="bg-green-50 border border-green-200 rounded-lg p-3 flex items-center gap-2 text-green-700">
                                                    <Check size={16} />
                                                    <span className="font-medium font-mono text-lg"><Latex content={partAnswers[index] || ""} /></span>
                                                </div>
                                            ) : isActive ? (
                                                <div className={`w-full bg-white border-2 rounded-xl p-3 min-h-[60px] flex items-center relative transition-colors ${feedback?.type === 'error' ? 'border-red-400 bg-red-50' : (feedback?.type === 'success' && feedback.isFinal) ? 'border-green-400 bg-green-50' : 'border-indigo-500 bg-indigo-50 ring-2 ring-indigo-100'}`}>
                                                    <span className="text-lg font-medium break-all">{userInput ? <Latex content={userInput} /> : <span className="text-slate-400 animate-pulse">|</span>}</span>
                                                    {feedback?.type === 'error' && <div className="absolute right-2 top-2 text-red-500"><X size={16}/></div>}
                                                </div>
                                            ) : (
                                                <div className="bg-slate-100 border border-slate-200 border-dashed rounded-lg p-3 flex items-center justify-center gap-2 text-slate-400 text-sm"><Lock size={14} /><span>請先完成 ({currentQ.parts[index-1]?.id}) 部</span></div>
                                            )}
                                            {isActive && feedback?.type === 'error' && <div className="text-red-500 text-xs font-bold mt-2 ml-1 flex items-center gap-1"><AlertTriangle size={12} /> {feedback.msg}</div>}
                                        </div>
                                    );
                                })}
                            </div>
                            {feedback?.type === 'success' && !feedback.isFinal && <div className="mt-4 bg-green-100 text-green-700 p-3 rounded-xl text-center font-bold animate-bounce text-sm">{feedback.msg}</div>}
                        </div>
                        <div className="w-full bg-white border-t border-slate-200 p-2 shrink-0 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                            <div className="flex gap-2 mb-2 px-1">
                                {feedback?.isFinal ? (
                                    <button onClick={nextQuestion} className="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-700 flex justify-center items-center gap-2 active:bg-green-800 touch-manipulation">下一題 <ArrowRight size={18}/></button>
                                ) : (
                                    <>
                                        <button onClick={skipQuestion} className="px-4 bg-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-300 text-sm active:bg-slate-400 touch-manipulation">跳過</button>
                                        <button onClick={submitAnswer} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 active:bg-indigo-800 active:scale-95 transition-transform text-lg touch-manipulation">提交</button>
                                    </>
                                )}
                            </div>
                            <Keyboard />
                        </div>
                    </div>
                )}

                {/* Summary */}
                {appState === 'summary' && (
                    <div className="flex-1 flex flex-col w-full p-4 overflow-hidden">
                        <div className="text-center py-6 bg-white rounded-2xl shadow-sm border border-slate-200 mb-4 shrink-0">
                            <Trophy size={48} className="mx-auto text-yellow-500 mb-2" />
                            <h2 className="text-2xl font-bold text-slate-800">練習結束</h2>
                            <div className="text-5xl font-black text-indigo-600 mt-2">{score}</div>
                            <p className="text-xs text-slate-400 mt-2">答對題數</p>
                        </div>
                        <div className="flex justify-between items-center mb-2 px-1">
                            <h3 className="font-bold text-slate-700 text-sm">答題記錄</h3>
                            <button onClick={() => setShowWrongOnly(!showWrongOnly)} className={`text-xs px-2 py-1 rounded border flex items-center gap-1 ${showWrongOnly ? 'bg-red-50 text-red-600 border-red-200' : 'bg-white text-slate-500 border-slate-200'}`}><Filter size={12}/> {showWrongOnly ? '顯示全部' : '只看錯題'}</button>
                        </div>
                        <div className="flex-1 overflow-y-auto bg-white rounded-xl border border-slate-200 p-4 mb-4">
                            {history.filter(h => !showWrongOnly || !h.correct).length === 0 ? (
                                <div className="text-center text-slate-400 py-8 text-sm">{showWrongOnly ? "沒有錯題，做得好！" : "尚未開始作答"}</div>
                            ) : (
                                history.filter(h => !showWrongOnly || !h.correct).map((item, idx) => (
                                    <div key={idx} className="mb-4 text-sm border-b border-slate-100 pb-3 last:border-0">
                                        <div className="flex justify-between mb-1">
                                            <span className="font-bold text-slate-400 text-xs">Q{item.qId} {item.part ? `(${item.part})` : ''}</span>
                                            {item.correct ? <span className="text-green-600 font-bold text-xs">正確</span> : <span className="text-red-500 font-bold text-xs">錯誤</span>}
                                        </div>
                                        <div className="bg-slate-50 p-2 rounded mb-1"><Latex content={item.latex} /></div>
                                        <div className="pl-2 text-slate-600"><span className="text-xs text-slate-400">答：</span><Latex content={item.userAns} /></div>
                                    </div>
                                ))
                            )}
                        </div>
                        <button onClick={() => setAppState('menu')} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg shadow-lg shrink-0">返回主目錄</button>
                    </div>
                )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FactorizationGameV6 />);
    </script>
</body>
</html>
